name: Generate Snake

on:
  schedule:
    # Berjalan otomatis setiap 24 jam
    - cron: "0 */24 * * *"
  
  # Biar bisa kita klik manual dari tab Actions
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali README di-update
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Menggambar animasi ular dari grafik kontribusi debayniaw
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: debayniaw
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Nge-push hasil gambar ular ke branch khusus bernama 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
